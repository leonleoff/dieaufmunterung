<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guken App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 2rem;
        }

        .button-container {
            margin-bottom: 40px;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        .result {
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            font-weight: 700;
            color: #667eea;
            transition: all 0.3s ease;
        }

        .result.hidden {
            opacity: 0;
        }

        .result.show {
            opacity: 1;
            animation: slideIn 0.5s ease;
        }

        /* Easter-egg styling */
        .result.easter {
            color: #e67e22;
            text-shadow: 0 6px 18px rgba(230,126,34,0.3);
            font-size: 2.2rem;
        }

        .result .emoji {
            margin-left: 10px;
            font-size: 1.2em;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile responsiveness */
        @media (max-width: 600px) {
            .container {
                padding: 30px 20px;
            }

            h1 {
                font-size: 1.5rem;
                margin-bottom: 30px;
            }

            button {
                padding: 14px 32px;
                font-size: 16px;
            }

            .result {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gucken 👀</h1>
        <div class="button-container">
            <button onclick="guken()">Gucken</button>
        </div>

        <div style="margin-bottom:16px; display:flex; gap:12px; justify-content:center; align-items:center; flex-wrap:wrap;">
            <div style="background:#f1f5f9;padding:8px 12px;border-radius:12px; font-weight:600;">Punkte: <span id="points">0</span></div>
            <div style="background:#f1f5f9;padding:8px 12px;border-radius:12px; font-weight:600;">Rossmanns: <span id="rossmanns">0</span></div>
            <button id="buyRossmann" style="padding:8px 14px;border-radius:12px;background:#2d3748;color:white;border:none;cursor:not-allowed;opacity:0.6;">Kaufe Rossmann (10)</button>
            <button id="sellRossmann" style="padding:8px 14px;border-radius:12px;background:#718096;color:white;border:none;">Verkaufe Rossmann</button>
            <div style="width:100%;height:6px"></div>
            <div style="background:#f1f5f9;padding:8px 12px;border-radius:12px; font-weight:600;">Minus Linus: <span id="minusLinus">0</span></div>
            <button id="buyMinus" style="padding:8px 14px;border-radius:12px;background:#b02a2a;color:white;border:none;cursor:not-allowed;opacity:0.6;">Kaufe Minus Linus (100)</button>
            <button id="sellMinus" style="padding:8px 14px;border-radius:12px;background:#718096;color:white;border:none;">Verkaufe Minus Linus</button>
            <div style="width:100%;height:6px"></div>
            <div style="background:#f1f5f9;padding:8px 12px;border-radius:12px; font-weight:600;">Hosenböcker: <span id="hosen">0</span></div>
            <button id="buyHosen" style="padding:8px 14px;border-radius:12px;background:#2b8a3e;color:white;border:none;cursor:not-allowed;opacity:0.6;">Kaufe Hosenböcker (200)</button>
            <button id="sellHosen" style="padding:8px 14px;border-radius:12px;background:#718096;color:white;border:none;">Verkaufe Hosenböcker</button>
        </div>

        <div class="result hidden" id="result">-</div>
    </div>

    <script>
        // Game state
        let points = 0;
        let rossmanns = 0;
        let minusLinus = 0;
        let hosen = 0;

        const pointsEl = document.getElementById('points');
        const rossEl = document.getElementById('rossmanns');
        const buyBtn = document.getElementById('buyRossmann');
        const sellRoss = document.getElementById('sellRossmann');
        const minusEl = document.getElementById('minusLinus');
        const buyMinusBtn = document.getElementById('buyMinus');
        const sellMinusBtn = document.getElementById('sellMinus');
        const hosenEl = document.getElementById('hosen');
        const buyHosenBtn = document.getElementById('buyHosen');
        const sellHosenBtn = document.getElementById('sellHosen');
        const resultElement = document.getElementById('result');

        function updateUI() {
            pointsEl.textContent = Math.floor(points);
            rossEl.textContent = rossmanns;
            minusEl.textContent = minusLinus;
            hosenEl.textContent = hosen;

            buyBtn.disabled = points < 10;
            buyBtn.style.opacity = points >= 10 ? '1' : '0.6';
            buyBtn.style.cursor = points >= 10 ? 'pointer' : 'not-allowed';

            sellRoss.disabled = rossmanns <= 0;
            sellRoss.style.opacity = rossmanns > 0 ? '1' : '0.6';
            sellRoss.style.cursor = rossmanns > 0 ? 'pointer' : 'not-allowed';

            buyMinusBtn.disabled = points < 100;
            buyMinusBtn.style.opacity = points >= 100 ? '1' : '0.6';
            buyMinusBtn.style.cursor = points >= 100 ? 'pointer' : 'not-allowed';

            sellMinusBtn.disabled = minusLinus <= 0;
            sellMinusBtn.style.opacity = minusLinus > 0 ? '1' : '0.6';
            sellMinusBtn.style.cursor = minusLinus > 0 ? 'pointer' : 'not-allowed';

            buyHosenBtn.disabled = points < 200;
            buyHosenBtn.style.opacity = points >= 200 ? '1' : '0.6';
            buyHosenBtn.style.cursor = points >= 200 ? 'pointer' : 'not-allowed';

            sellHosenBtn.disabled = hosen <= 0;
            sellHosenBtn.style.opacity = hosen > 0 ? '1' : '0.6';
            sellHosenBtn.style.cursor = hosen > 0 ? 'pointer' : 'not-allowed';
        }

        // Buy/sell handlers
        buyBtn.addEventListener('click', () => {
            if (points >= 10) {
                points -= 10;
                rossmanns += 1;
                updateUI();
            }
        });
        sellRoss.addEventListener('click', () => {
            if (rossmanns > 0) {
                rossmanns -= 1;
                points += 10; // refund full price
                updateUI();
            }
        });

        buyMinusBtn.addEventListener('click', () => {
            if (points >= 100) {
                points -= 100;
                minusLinus += 1;
                updateUI();
            }
        });
        sellMinusBtn.addEventListener('click', () => {
            if (minusLinus > 0) {
                minusLinus -= 1;
                points += 100;
                updateUI();
            }
        });

        buyHosenBtn.addEventListener('click', () => {
            if (points >= 200) {
                points -= 200;
                hosen += 1;
                updateUI();
            }
        });
        sellHosenBtn.addEventListener('click', () => {
            if (hosen > 0) {
                hosen -= 1;
                points += 200;
                updateUI();
            }
        });

        // Passive: Rossmanns give +1 per 5s (keep previous behavior)
        setInterval(() => {
            if (rossmanns > 0) {
                points += rossmanns;
                updateUI();
                resultElement.classList.remove('show');
                void resultElement.offsetWidth;
                resultElement.classList.add('show');
            }
        }, 5000);

        // Passive per-second effects: Hosenböcker +20/s each, Minus Linus -10/s each
        setInterval(() => {
            const delta = (hosen * 20) - (minusLinus * 10);
            if (delta !== 0) {
                points += delta;
                updateUI();
                // kleine visuelle Anzeige
                resultElement.classList.remove('show');
                void resultElement.offsetWidth;
                resultElement.classList.add('show');
            }
        }, 1000);

        // initial UI state
        updateUI();

        function guken() {
            // Erhöhe Punkte bei jedem Klick
            points += 1;
            updateUI();

            // Animation zurücksetzen
            resultElement.classList.remove('show', 'easter');
            resultElement.classList.add('hidden');
            resultElement.innerHTML = '-';

            // Kurze Verzögerung für neue Animation
            setTimeout(() => {
                const r = Math.random();

                // Sehr seltene Easter Eggs: jeweils ~1% Chance
                if (r < 0.01) {
                    // Hallo von Ziner mit einer Blume
                    resultElement.innerHTML = 'Hallo von Ziner <span class="emoji">🌸</span>';
                    resultElement.classList.add('easter');
                } else if (r < 0.02) {
                    // Krakadus mit einem Krokodil
                    resultElement.innerHTML = 'Krakadus mit Krokodil <span class="emoji">🐊</span>';
                    resultElement.classList.add('easter');
                } else if (r < 0.03) {
                    // Patatas Bravas mit Kartoffel und spanischer Flagge
                    resultElement.innerHTML = 'Patatas Bravas <span class="emoji">🥔🇪🇸</span>';
                    resultElement.classList.add('easter');
                } else {
                    // Standard-Ausgabe: 50/50 zwischen 12,6 und 12,7
                    const normal = Math.random() < 0.5 ? '12,6' : '12,7';
                    resultElement.textContent = normal;
                }

                resultElement.classList.remove('hidden');
                resultElement.classList.add('show');
            }, 120);
        }
    </script>
</body>
</html>
